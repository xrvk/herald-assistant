# ============================================================
# Scout Report — Synology NAS / Container Manager
# ============================================================
# Calendar notification bot — fetches ICS feeds on a schedule
# and sends digest notifications via Apprise (Discord webhook).
#
# See NAS-DUAL-SETUP.md for the full step-by-step guide.
# ============================================================

services:
  scout-report:
    build: .
    container_name: scout_report
    restart: always
    environment:

      # ── Calendars ─────────────────────────────────────────────────────
      CALENDAR_1_URL: "${CALENDAR_1_URL}"
      CALENDAR_1_LABEL: "${CALENDAR_1_LABEL:-Personal}"
      CALENDAR_2_URL: "${CALENDAR_2_URL}"
      CALENDAR_2_LABEL: "${CALENDAR_2_LABEL:-Work}"

      # ── Timezone ──────────────────────────────────────────────────────
      TZ: "${TZ:-America/Los_Angeles}"

      # ── Notifications ─────────────────────────────────────────────────
      APPRISE_URL: "${APPRISE_URL}"

      # Weeknight: tomorrow's work events — Sun–Thu at 6:00 PM
      WEEKNIGHT_SCHEDULE: "${WEEKNIGHT_SCHEDULE:-off}"
      # Weekend preview: Fri–Sun events — Thursday at 3:00 PM
      WEEKEND_SCHEDULE: "${WEEKEND_SCHEDULE:-off}"
      # Noon brief: off
      NOON_SCHEDULE: "${NOON_SCHEDULE:-off}"

      WORK_LABELS: "${CALENDAR_2_LABEL:-Work}"

      # ── Discord Bot (optional) ─────────────────────────────────────
      # Enables online presence + .help/.cal/.schedule commands.
      # Leave empty for headless webhook-only mode.
      DISCORD_TOKEN: ""

    volumes:
      - /volume1/docker/scout-report/data:/app/data
