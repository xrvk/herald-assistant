# ============================================================
# Scout Report — Synology NAS / Container Manager
# ============================================================
# Calendar notification bot — fetches ICS feeds on a schedule
# and sends digest notifications via Apprise (Discord webhook, etc.)
#
# SETUP:
#   1. Fill in your values below (replace the placeholder strings)
#   2. Create the project in Container Manager
#
# See NAS-DUAL-SETUP.md for the full step-by-step guide.
# ============================================================

services:
  scout-report:
    build: .
    container_name: scout_report
    restart: always
    environment:

      # ── Calendars (at least one required) ─────────────────────────────
      # Any ICS URL works — iCloud (webcal://), Outlook (https://), Google (https://), etc.
      # iCloud webcal:// URLs are automatically converted to https:// by the bot.
      # See NAS-DUAL-SETUP.md for how to get these URLs.
      CALENDAR_1_URL: "https://your-calendar-url.ics"
      CALENDAR_1_LABEL: "${CALENDAR_1_LABEL:-Personal}"
      # CALENDAR_2_URL: "https://your-second-calendar-url.ics"
      # CALENDAR_2_LABEL: "${CALENDAR_2_LABEL:-Work}"
      # CALENDAR_3_URL: "https://your-third-calendar-url.ics"
      # CALENDAR_3_LABEL: "Family"
      # Up to CALENDAR_9_URL / CALENDAR_9_LABEL supported.

      # ── Timezone ──────────────────────────────────────────────────────
      # IANA timezone — controls when scheduled digests fire.
      # Full list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
      TZ: "${TZ:-America/Los_Angeles}"

      # ── Notifications (required — at least one schedule must be enabled) ──
      # Discord webhook → convert to Apprise format:
      #   https://discord.com/api/webhooks/ID/TOKEN
      #   → discord://ID/TOKEN
      # See https://github.com/caronc/apprise for 90+ supported services.
      APPRISE_URL: "discord://webhook_id/webhook_token"

      # Schedule format: "days HH:MM" (24-hour) or "${NOON_SCHEDULE:-off}" to disable.
      # days = comma-separated: mon,tue,wed,thu,fri,sat,sun
      WEEKNIGHT_SCHEDULE: "sun,mon,tue,wed,thu 20:00"
      WEEKEND_SCHEDULE: "thu 16:00"
      NOON_SCHEDULE: "${NOON_SCHEDULE:-off}"

      # Which calendar labels count as "work" — controls the weeknight + noon digests.
      # Must match a CALENDAR_N_LABEL value exactly.
      WORK_LABELS: "${CALENDAR_2_LABEL:-Work}"

      # ── Optional Tuning ────────────────────────────────────────────────
      # CACHE_TTL: "3600"           # calendar fetch cache in seconds (1h)

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
services:
  scout-report:
    build: .
    container_name: scout_report
    restart: always
    env_file:
      - .env
    environment:
      - FILTERS_PATH=/app/data/filters.json
    volumes:
      - scout-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  scout-data: